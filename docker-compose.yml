services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_PATH: /app/storage/app.db
      UPLOADS_DIR: /app/public/uploads
      ADMIN_PASSWORD: "admin123"
    volumes:
      - ./storage:/app/storage
      - ./public/uploads:/app/public/uploads
